<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold fs-5" routerLink="/">Bibliothèque</a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navMenu"
      aria-controls="navMenu"
      aria-expanded="false"
      aria-label="Menu"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            data-bs-dismiss="collapse"
            >Accueil</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/recherche"
            routerLinkActive="active"
            data-bs-dismiss="collapse"
            >Rechercher</a
          >
        </li>

        <ng-container *ngIf="utilisateurConnecte$ | async as utilisateur; else nonConnecte">
          <li *ngIf="utilisateur.role === 'bibliothecaire'" class="nav-item">
            <a
              class="nav-link"
              routerLink="/creer-utilisateur"
              routerLinkActive="active"
              data-bs-dismiss="collapse"
              >Créer un utilisateur</a
            >
          </li>
          <li class="nav-item d-flex align-items-center ms-2 text-white fw-semibold">
            Bonjour {{ utilisateur.prenom }} {{ utilisateur.nom }}
            <span class="ms-1">({{ formatRole(utilisateur.role) }})</span>
          </li>
          <li class="nav-item ms-2">
            <button type="button" class="btn btn-outline-light btn-sm px-3" (click)="deconnecter()">
              Se déconnecter
            </button>
          </li>
        </ng-container>

        <ng-template #nonConnecte>
          <li class="nav-item ms-2">
            <a
              class="btn btn-outline-light btn-sm px-3"
              routerLink="/connexion"
              data-bs-dismiss="collapse"
              >Se connecter</a
            >
          </li>
        </ng-template>
      </ul>
    </div>
  </div>
</nav>
