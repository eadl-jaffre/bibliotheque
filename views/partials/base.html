{{define "base"}}
<!DOCTYPE html>
<html lang="fr">


<head>
    {{template "head" .}}
    <title>{{block "title" .}}{{.Title}}{{end}}</title>
</head>

<header>
    {{template "header" .}}
</header>

<body>
    <div class="container">
        <style>
            body {
                padding-top: 80px;
            }
        </style>

        {{block "content" .}}{{end}}
    </div>

</body>

<footer>
    {{template "footer" .}}
</footer>

</html>
{{end}}
