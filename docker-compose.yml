services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin_bibli}
      POSTGRES_DB: bibliotheque
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  back:
    image: ${BACK_IMAGE:-ghcr.io/eadl-jaffre/bibliotheque-back:latest}
    build: ./back
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-admin_bibli}
      DB_NAME: bibliotheque
      DB_SSLMODE: disable
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  front:
    image: ${FRONT_IMAGE:-ghcr.io/eadl-jaffre/bibliotheque-front:latest}
    build: ./front
    ports:
      - "80:80"
    depends_on:
      - back

volumes:
  postgres_data:
