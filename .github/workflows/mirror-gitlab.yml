name: Mirror to GitLab

on:
  push:
    branches: ["main"]

jobs:
  mirror:
    name: Push mirror to GitLab
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/lin56/bibliotheque.git
          git push gitlab --mirror
